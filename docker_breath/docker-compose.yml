# docker_breath - окружение имейджборды
# подключаемые сервисы: postgreSQL, redis,  minio,  pgadmin, redis insight

networks:
  organism_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_flesh:
    driver: local
  redis_memory:
    driver: local
  minio_storage:
    driver: local
  pgadmin_data:
    driver: local

services:

# archive_meat_core - postgreSQL(основная БД)

  postgres:
    image: postgres:16-alpine
    container_name: archive_meat_core
    restart: unless-stopped
    networks:
      organism_net:
        ipv4_address: 172.28.0.10
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-imageboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-imageboard_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_flesh:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imageboard} -d ${POSTGRES_DB:-imageboard_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=500
        -c log_checkpoints=on

# flow_of_ichor - redis (кэш + pub/sub + rate-limit)

  redis:
    image: redis:7-alpine
    container_name: flow_of_ichor
    restart: unless-stopped
    networks:
      organism_net:
        ipv4_address: 172.28.0.11
    ports:
      - "6379:6379"
    volumes:
      - redis_memory:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# file_sinapsis - minio (S3-compatible object storage)

  minio:
    image: minio/minio:latest
    container_name: file_sinapsis
    restart: unless-stopped
    networks:
      organism_net:
        ipv4_address: 172.28.0.12
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-imageboard_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_in_prod}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_storage:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

# minio_init - создаёт бакеты при первом запуске

  minio_init:
    image: minio/mc:latest
    container_name: minio_init
    networks:
      - organism_net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-imageboard_admin} ${MINIO_ROOT_PASSWORD:-changeme_in_prod};
        mc mb --ignore-existing local/media;
        mc mb --ignore-existing local/thumbs;
        mc mb --ignore-existing local/backups;
        mc anonymous set download local/media;
        mc anonymous set download local/thumbs;
        echo 'MinIO buckets initialised';
      "
    restart: on-failure

# pgadmin — gui для postgreSQL(только dev)

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_panel
    restart: unless-stopped
    networks:
      organism_net:
        ipv4_address: 172.28.0.20
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./config/pgadmin_servers.json:/pgadmin4/servers.json:ro
    profiles:
      - devtools
    depends_on:
      postgres:
        condition: service_healthy

# redis insight - gui для redis(только dev)

  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: unless-stopped
    networks:
      organism_net:
        ipv4_address: 172.28.0.21
    ports:
      - "5540:5540"
    profiles:
      - devtools
    depends_on:
      redis:
        condition: service_healthy
